stages:
  - deploy_test
  - deploy_prod

deploy-test-job:
  stage: deploy_test
  tags:
    - sos
  variables:
    COMPOSE_HTTP_TIMEOUT: 300
    DOCKER_CLIENT_TIMEOUT: 300
  script:
    - echo "Logging into the container registry for TEST..."
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"

    - echo "Stopping and removing existing TEST containers..."
    - docker-compose -f Docker-Compose-Test/docker-compose.frontend.yml -f Docker-Compose-Test/docker-compose.backend.yml -f Docker-Compose-Test/docker-compose.nginx.yml -f Docker-Compose-Test/docker-compose.ai.yml -f Docker-Compose-Test/docker-compose.kafka.yml down --remove-orphans

    - echo "Pulling latest images..."
    - docker-compose -f Docker-Compose-Test/docker-compose.frontend.yml -f Docker-Compose-Test/docker-compose.backend.yml -f Docker-Compose-Test/docker-compose.nginx.yml -f Docker-Compose-Test/docker-compose.ai.yml -f Docker-Compose-Test/docker-compose.kafka.yml pull

    - echo "Starting TEST containers with latest images..."
    - docker-compose -f Docker-Compose-Test/docker-compose.frontend.yml -f Docker-Compose-Test/docker-compose.backend.yml -f Docker-Compose-Test/docker-compose.nginx.yml -f Docker-Compose-Test/docker-compose.ai.yml -f Docker-Compose-Test/docker-compose.kafka.yml up -d --force-recreate --remove-orphans

    - echo "Listing running containers..."
    - docker ps -a

    - echo "Cleaning up unused Docker images..."
    # - docker image prune -af

    - echo "Test deployment completed successfully."
  only:
    - main
  when: manual
  allow_failure: false

