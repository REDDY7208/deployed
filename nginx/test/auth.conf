server {
    listen 443 ssl;
    server_name auth.enterprise.sealedfiles.com;

    ssl_certificate /etc/letsencrypt/live/auth.enterprise.sealedfiles.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth.enterprise.sealedfiles.com/privkey.pem;

   
   
    # Global timeout settings
    proxy_connect_timeout       18000s;
    proxy_send_timeout          18000s;
    proxy_read_timeout          18000s;
    send_timeout                18000s;
    client_max_body_size 50m;
    # Route to my-app service
    
    
    location /{
        proxy_pass http://3.108.110.96:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
    


}


 

server {
    listen 80;
    server_name auth.enterprise.sealedfiles.com;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri; 
}

